<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FHAI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card p-4 shadow login-card text-center">
        <h2 class="fw-bold text-welcome">Welcome to</h2>
        <h1 class="fw-bold text-logo display-4">FHAI</h1>
        <p class="mb-4 tagline">Intelligence that empowers your money.</p>

        <form>
          <div class="mb-3">
            <input
              type="email"
              class="form-control rounded-pill"
              placeholder="Email"
            />
          </div>
          <div class="mb-2">
            <input
              type="password"
              class="form-control rounded-pill"
              placeholder="Password"
            />
          </div>
          <div class="text-end mb-3">
            <a href="#" class="small text-dark fw-bold">Forgot password?</a>
          </div>
          <button
            type="submit"
            class="btn btn-success w-100 rounded-pill fw-bold"
            id="login"
          >
            Sign in
          </button>
        </form>

        <div class="my-3">
          <button class="btn btn-light social-btn">
            <img
              src="./assets/icons8-google.svg"
              alt="Google Icon"
              class="rounded-cicle"
            />
          </button>
          <button class="btn btn-light social-btn">
            <img
              src="./assets/icons8-facebook.svg"
              alt="Facebook Icon"
              class="rounded-cicle"
            />
          </button>
        </div>

        <p class="mt-3 small">
          Don't have an account? <a href="#" class="fw-bold">Sign up!</a>
        </p>
      </div>
    </div>

    <script src="./js/scripts.js"></script>
  </body>
</html>
